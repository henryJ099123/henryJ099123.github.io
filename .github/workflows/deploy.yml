# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          # cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Create notes directories
        run: mkdir -p './dist/notes/'
      - name: Create ACTIVE_NOTES env variable
        run: echo "ACTIVE_NOTES=\"$(grep '"urlname":' src/data/notes.json | sed -E 's/.*"urlname". "(.*)".*/\1/' | tr "\n" " ")\"" >> $GITHUB_ENV
      - name: Verify output
        run: echo "active notes - $ACTIVE_NOTES"
      - name: make directories and copy index file
        run: for note in $(echo $ACTIVE_NOTES); do mkdir -p "./dist/notes/$note/"; cp './dist/index.html' "./dist/notes/$note/index.html"; done
      - name: verify output
        run: ls -R './dist/'
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist folder
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
